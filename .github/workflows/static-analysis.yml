name: Static Analysis

on:
  pull_request:

jobs:
  changes:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: read
    outputs:
      frontend: ${{ steps.filter.outputs.frontend }}
      zero-query: ${{ steps.filter.outputs.zero-query }}
      tooling: ${{ steps.filter.outputs.tooling }}
    steps:
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            frontend:
              - 'frontend/**'
            zero-query:
              - 'zero-query/**'
            tooling:
              - 'package.json'
              - 'pnpm-lock.yaml'
              - 'pnpm-workspace.yaml'
              - '.nvmrc'

  static-analysis-frontend:
    needs: changes
    if: needs.changes.outputs.frontend == 'true' || needs.changes.outputs.tooling == 'true'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        script: [lint, format, type-check]
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.17.1
      - uses: actions/setup-node@v4
        with:
          node-version: '20.19'
          cache: 'pnpm'
          cache-dependency-path: pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
      - run: pnpm run ${{ matrix.script }}

  static-analysis-zero-query:
    needs: changes
    if: needs.changes.outputs.zero-query == 'true' || needs.changes.outputs.tooling == 'true'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        script: [lint, format, type-check]
    defaults:
      run:
        working-directory: zero-query
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.17.1
      - uses: actions/setup-node@v4
        with:
          node-version: '20.19'
          cache: 'pnpm'
          cache-dependency-path: pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
      - run: pnpm run ${{ matrix.script }}
