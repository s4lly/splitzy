name: Static Analysis

on:
  pull_request:

jobs:
  changes:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: read
    outputs:
      frontend: ${{ steps.filter.outputs.frontend }}
      zero-query: ${{ steps.filter.outputs.zero-query }}
    steps:
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            frontend:
              - 'frontend/**'
            zero-query:
              - 'zero-query/**'

  static-analysis:
    needs: changes
    if: ${{ (matrix.subsystem == 'frontend' && needs.changes.outputs.frontend == 'true') || (matrix.subsystem == 'zero-query' && needs.changes.outputs.zero-query == 'true') }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        subsystem: [frontend, zero-query]
        script: [lint, format, type-check]
        include:
          - subsystem: frontend
            node-version: '20'
          - subsystem: zero-query
            node-version: '20.19'
    defaults:
      run:
        working-directory: ${{ matrix.subsystem }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'
          cache-dependency-path: ${{ matrix.subsystem }}/package-lock.json
      - run: npm ci
      - run: npm run ${{ matrix.script }}
