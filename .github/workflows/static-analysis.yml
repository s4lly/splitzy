name: Static Analysis

on:
  pull_request:

jobs:
  changes:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: read
    outputs:
      frontend: ${{ steps.filter.outputs.frontend }}
      zero-query: ${{ steps.filter.outputs.zero-query }}
    steps:
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            frontend:
              - 'frontend/**'
            zero-query:
              - 'zero-query/**'

  frontend-lint:
    needs: changes
    if: ${{ needs.changes.outputs.frontend == 'true' }}
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run lint

  frontend-format:
    needs: changes
    if: ${{ needs.changes.outputs.frontend == 'true' }}
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run format

  frontend-type-check:
    needs: changes
    if: ${{ needs.changes.outputs.frontend == 'true' }}
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run type-check

  zero-query-lint:
    needs: changes
    if: ${{ needs.changes.outputs.zero-query == 'true' }}
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: zero-query
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: zero-query/package-lock.json
      - run: npm ci
      - run: npm run lint

  zero-query-format:
    needs: changes
    if: ${{ needs.changes.outputs.zero-query == 'true' }}
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: zero-query
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: zero-query/package-lock.json
      - run: npm ci
      - run: npm run format

  zero-query-type-check:
    needs: changes
    if: ${{ needs.changes.outputs.zero-query == 'true' }}
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: zero-query
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: zero-query/package-lock.json
      - run: npm ci
      - run: npm run type-check
